server {
    listen 80;
    server_name _;  # Replace with your domain if you have one

    # Uncomment below and comment out the location block to redirect HTTP → HTTPS
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (critical for streaming responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Serve static files directly via Nginx (faster than Python)
    location /static/ {
        alias /home/ubuntu/playground/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
